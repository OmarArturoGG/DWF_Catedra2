<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Catalogo | Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<main class="container app-shell py-4">
    <div th:if="${ok}" class="alert alert-success py-2" th:text="${ok}"></div>
    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

    <section class="surface p-3">
        <h1 class="h5 mb-3">Catalogo disponible</h1>
        <div class="table-responsive">
            <table class="table table-sm align-middle">
                <thead>
                <tr><th>Titulo</th><th>Autor</th><th>Tipo</th><th>Acciones</th></tr>
                </thead>
                <tbody>
                <tr th:each="l : ${libros}">
                    <td th:text="${l.titulo}"></td>
                    <td th:text="${l.autor}"></td>
                    <td th:text="${l.tipo}"></td>
                    <td class="action-group">
                        <form th:action="@{'/catalogo/prestar/' + ${l.id}}" method="post" class="m-0">
                            <button class="btn btn-sm btn-outline-primary" type="submit">Prestar</button>
                        </form>
                        <form th:action="@{'/catalogo/deseos/' + ${l.id}}" method="post" class="m-0">
                            <button class="btn btn-sm btn-outline-secondary" type="submit">Lista deseos</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
