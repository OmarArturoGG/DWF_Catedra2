<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Inicio | Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<main class="container app-shell py-4">
    <section class="surface p-4">
        <h1 class="h4 mb-2">Panel principal</h1>
        <p class="muted mb-4">Gestiona catalogo, autores, editoriales y tu lista de deseos.</p>
        <div class="row g-3">
            <div class="col-md-4">
                <a class="text-decoration-none" href="/admin">
                    <div class="surface p-3 h-100">
                        <div class="section-title">Administracion</div>
                        <div class="muted">Materiales, autores y editoriales</div>
                    </div>
                </a>
            </div>
            <div class="col-md-4">
                <a class="text-decoration-none" href="/mi-cuenta">
                    <div class="surface p-3 h-100">
                        <div class="section-title">Mi perfil</div>
                        <div class="muted">Datos de cuenta y lista de deseos</div>
                    </div>
                </a>
            </div>
        </div>
    </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script>
    auth.requireSession();
    document.getElementById("userBadge").textContent = auth.userName || "Usuario";
    document.getElementById("logoutBtn").addEventListener("click", () => {
      auth.clear();
      window.location.href = "/login";
    });
</script>
</body>
</html>
