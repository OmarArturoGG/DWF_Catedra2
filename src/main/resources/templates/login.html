<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container min-vh-100 d-flex align-items-center justify-content-center app-shell">
    <section class="surface p-4 p-md-5 w-100 login-card">
        <h1 class="h4 mb-1">Iniciar sesion</h1>
        <p class="muted mb-4">Accede a tu cuenta para gestionar prestamos y materiales.</p>

        <form id="loginForm" class="d-grid gap-3">
            <div>
                <label for="email" class="form-label">Correo</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div>
                <label for="password" class="form-label">Contrasena</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button id="btnLogin" type="submit" class="btn btn-primary">Ingresar</button>
            <div id="loginStatus" class="small"></div>
        </form>
    </section>
</main>

<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/login.js}"></script>
</body>
</html>
