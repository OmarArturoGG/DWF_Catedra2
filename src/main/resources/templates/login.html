<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container min-vh-100 d-flex align-items-center justify-content-center app-shell">
    <section class="surface p-4 p-md-5 w-100 login-card">
        <h1 class="h4 mb-1">Iniciar sesion</h1>
        <p class="muted mb-4">Accede a tu cuenta de biblioteca.</p>

        <div th:if="${ok}" class="alert alert-success py-2" th:text="${ok}"></div>
        <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

        <form method="post" action="/login" class="d-grid gap-3">
            <div>
                <label for="email" class="form-label">Correo</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div>
                <label for="password" class="form-label">Contrasena</label>
                <input type="password" id="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary">Ingresar</button>
        </form>
        <p class="mt-3 mb-0 small">No tienes cuenta? <a href="/registro">Registrate</a></p>
    </section>
</main>
</body>
</html>
