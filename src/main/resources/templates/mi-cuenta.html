<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Perfil | Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<main class="container app-shell py-4">
    <div th:if="${ok}" class="alert alert-success py-2" th:text="${ok}"></div>
    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

    <div class="row g-3">
        <div class="col-lg-4">
            <section class="surface p-3">
                <h2 class="h6 mb-3">Perfil de usuario</h2>
                <div class="mb-2"><strong>Nombre:</strong> <span th:text="${usuario.nombre}"></span></div>
                <div class="mb-2"><strong>Correo:</strong> <span th:text="${usuario.email}"></span></div>
                <div class="mb-0"><strong>Registro:</strong> <span th:text="${usuario.fechaRegistro}"></span></div>
            </section>
        </div>

        <div class="col-lg-8">
            <section class="surface p-3">
                <h2 class="h6 mb-3">Lista de deseos</h2>
                <div th:if="${#lists.isEmpty(listaDeseos)}" class="muted">No hay elementos en tu lista de deseos.</div>
                <div th:each="item : ${listaDeseos}" class="wishlist-item d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <div class="fw-semibold" th:text="${item.libro.titulo}"></div>
                        <div class="muted" th:text="${item.libro.autor}"></div>
                        <small class="muted" th:text="'Agregado: ' + ${item.fechaAgregado}"></small>
                    </div>
                    <form th:action="@{'/mi-cuenta/lista-deseos/' + ${item.libro.id} + '/eliminar'}" method="post" class="m-0">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Remover</button>
                    </form>
                </div>
            </section>
        </div>
    </div>
</main>
</body>
</html>
