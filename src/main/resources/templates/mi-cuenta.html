<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Mi cuenta</title>
</head>
<body>

<div th:replace="~{navbar :: navbar}"></div>

<h2>👤 Mi cuenta</h2>

<div id="perfilContainer"></div>

<h3>📜 Historial de préstamos</h3>
<div id="historialContainer"></div>

<script>
  const usuarioId = localStorage.getItem('usuarioId');
  const usuarioNombre = localStorage.getItem('usuarioNombre');

  if (!usuarioId) {
      window.location.href = '/login';
  }

  async function cargarPerfil() {
      try {
          const response = await fetch(`/api/usuarios/${usuarioId}`);
          const usuario = await response.json();

          const perfilDiv = document.getElementById('perfilContainer');
          perfilDiv.innerHTML = `
              <p><strong>Nombre:</strong> ${usuario.nombre}</p>
              <p><strong>Email:</strong> ${usuario.email}</p>
              <p><strong>Fecha de registro:</strong> ${usuario.fechaRegistro}</p>
              <hr>
              <h4>Foto de perfil</h4>
              <img src="https://ui-avatars.com/api/?background=667eea&color=fff&name=${usuario.nombre}" width="100" height="100">
              <p><small>Puedes cambiar tu foto más adelante</small></p>
          `;
      } catch (error) {
          document.getElementById('perfilContainer').innerHTML = 'Error al cargar perfil';
      }
  }

  async function cargarHistorial() {
      try {
          const response = await fetch(`/api/usuarios/obtener/${usuarioId}`);
          const prestamos = await response.json();

          const container = document.getElementById('historialContainer');
          container.innerHTML = '';

          if (prestamos.length === 0) {
              container.innerHTML = '<p>No tienes préstamos en tu historial.</p>';
              return;
          }

          for (const prestamo of prestamos) {
              const libro = prestamo.libro;
              const div = document.createElement('div');
              div.style.border = '1px solid #ccc';
              div.style.margin = '10px';
              div.style.padding = '10px';

              div.innerHTML = `
                  <strong>${libro.titulo}</strong><br>
                  Autor: ${libro.autor}<br>
                  Fecha préstamo: ${prestamo.fechaPrestamo}<br>
                  Fecha límite: ${prestamo.fechaLimite}<br>
                  Estado: ${prestamo.estado}
              `;
              container.appendChild(div);
          }
      } catch (error) {
          document.getElementById('historialContainer').innerHTML = 'Error al cargar historial';
      }
  }

  cargarPerfil();
  cargarHistorial();
</script>

</body>
</html>
