<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi Perfil | Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<main class="container app-shell py-4">
    <div class="row g-3">
        <div class="col-lg-4">
            <section class="surface p-3">
                <h2 class="h6 mb-3">Perfil de usuario</h2>
                <div class="mb-2"><strong>Nombre:</strong> <span id="profileName"></span></div>
                <div class="mb-2"><strong>Correo:</strong> <span id="profileEmail"></span></div>
                <div class="mb-0"><strong>Registro:</strong> <span id="profileDate"></span></div>
            </section>
        </div>

        <div class="col-lg-8">
            <section class="surface p-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h2 class="h6 mb-0">Lista de deseos</h2>
                </div>
                <div id="wishlistContainer" class="d-grid gap-2"></div>
                <div id="profileStatus" class="small mt-3"></div>
            </section>
        </div>
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
<script th:src="@{/js/profile.js}"></script>
</body>
</html>
