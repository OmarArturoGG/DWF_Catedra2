<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg bg-white border-bottom">
    <div class="container app-shell">
        <a class="navbar-brand fw-semibold" th:href="${usuarioRol == 'ADMIN'} ? @{/admin} : @{/usuario}">Biblioteca</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div id="mainNav" class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="${usuarioRol == 'ADMIN'} ? @{/admin} : @{/usuario}">Inicio</a></li>
                <li class="nav-item" th:if="${usuarioRol == 'ADMIN'}"><a class="nav-link" href="/admin">Administracion</a></li>
                <li class="nav-item" th:if="${usuarioRol != 'ADMIN'}"><a class="nav-link" href="/usuario">Catalogo</a></li>
                <li class="nav-item" th:if="${usuarioRol != 'ADMIN'}"><a class="nav-link" href="/mis-prestamos">Mis prestamos</a></li>
                <li class="nav-item"><a class="nav-link" href="/mi-cuenta">Mi perfil</a></li>
            </ul>
            <div class="d-flex align-items-center gap-2">
                <span class="badge text-bg-light border" th:text="${usuarioNombre}">Usuario</span>
                <form method="post" action="/logout" class="m-0">
                    <button type="submit" class="btn btn-sm btn-outline-secondary">Salir</button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
