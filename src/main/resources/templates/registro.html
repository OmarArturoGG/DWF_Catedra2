<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro | Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container min-vh-100 d-flex align-items-center justify-content-center app-shell">
    <section class="surface p-4 p-md-5 w-100 login-card">
        <h1 class="h4 mb-1">Crear cuenta</h1>
        <p class="muted mb-4">Registra tu usuario para ingresar a la plataforma.</p>

        <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

        <form method="post" action="/registro" class="d-grid gap-3">
            <div>
                <label for="nombre" class="form-label">Nombre</label>
                <input type="text" id="nombre" name="nombre" class="form-control" required>
            </div>
            <div>
                <label for="email" class="form-label">Correo</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div>
                <label for="password" class="form-label">Contrasena</label>
                <input type="password" id="password" name="password" class="form-control" minlength="6" required>
            </div>
            <div>
                <label for="tipoUsuario" class="form-label">Tipo de usuario</label>
                <select id="tipoUsuario" name="tipoUsuario" class="form-select" onchange="toggleAdminCode()">
                    <option value="USER">Usuario normal</option>
                    <option value="ADMIN">Administrador</option>
                </select>
            </div>
            <div id="adminCodeBox" style="display:none;">
                <label for="codigoAdmin" class="form-label">Codigo administrador</label>
                <input type="password" id="codigoAdmin" name="codigoAdmin" class="form-control">
            </div>
            <button type="submit" class="btn btn-primary">Registrarme</button>
        </form>
        <p class="mt-3 mb-0 small">Ya tienes cuenta? <a href="/login">Inicia sesion</a></p>
    </section>
</main>
<script>
    function toggleAdminCode() {
      const isAdmin = document.getElementById('tipoUsuario').value === 'ADMIN';
      document.getElementById('adminCodeBox').style.display = isAdmin ? 'block' : 'none';
      document.getElementById('codigoAdmin').required = isAdmin;
    }
</script>
</body>
</html>
