<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Catalogo de Libros | Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{navbar :: navbar}"></div>

<main class="container app-shell py-4">
    <div th:if="${ok}" class="alert alert-success py-2" th:text="${ok}"></div>
    <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

    <section class="surface p-3">
        <h1 class="h5 mb-3">Libros de la biblioteca</h1>
        <p class="muted mb-3">Listado cargado desde base de datos.</p>
        <div class="table-responsive">
            <table class="table table-sm align-middle">
                <thead>
                <tr><th>Titulo</th><th>Autor</th><th>Tipo</th><th>Estado</th><th>Acciones</th></tr>
                </thead>
                <tbody>
                <tr th:each="l : ${libros}">
                    <td><a th:href="@{'/detalles-libro?id=' + ${l.id}}" th:text="${l.titulo}"></a></td>
                    <td th:text="${l.autor}"></td>
                    <td th:text="${l.tipo}"></td>
                    <td th:text="${l.disponible} ? 'Disponible' : 'No disponible'"></td>
                    <td class="action-group">
                        <form th:if="${l.tipo == 'FISICO' and l.disponible}" th:action="@{'/catalogo/prestar/' + ${l.id}}" method="post" class="m-0">
                            <button class="btn btn-sm btn-outline-primary" type="submit">Prestar</button>
                        </form>
                        <a th:if="${l.tipo == 'VIRTUAL' and l.pdfUrl != null and l.disponible}" th:href="@{'/leer-pdf?id=' + ${l.id}}" target="_blank" class="btn btn-sm btn-outline-success">Leer PDF</a>
                        <button th:if="${!l.disponible and l.tipo == 'FISICO'}" class="btn btn-sm btn-secondary" type="button" disabled>No disponible</button>
                        <form th:action="@{'/catalogo/deseos/' + ${l.id}}" method="post" class="m-0">
                            <button class="btn btn-sm btn-outline-secondary" type="submit">Lista deseos</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
